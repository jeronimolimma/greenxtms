<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreamento de Encomenda - GreenX TMS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚚</text></svg>">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body style="background-color: var(--bg-light); display: flex; flex-direction: column; min-height: 100vh;">

    <header style="background: var(--card-bg); padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; border-bottom: 1px solid var(--border-color);">
        <h2 style="color: var(--primary); margin: 0; font-size: 1.8rem;"><i class="fa-solid fa-truck-fast"></i> GreenX TMS</h2>
        <p style="color: var(--text-light); margin: 5px 0 0;">Sistema de Rastreamento Público</p>
    </header>

    <main style="flex: 1; padding: 30px 20px; max-width: 800px; margin: 0 auto; width: 100%;">
        
        <div class="card" style="margin-bottom: 30px; padding: 30px;">
            <label style="display: block; margin-bottom: 10px; font-weight: 600; color: var(--text-dark);">Rastrear Encomenda</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="track-input" placeholder="Digite seu código de rastreio (Ex: VIO...)" style="flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 1rem; outline: none;">
                <button class="btn-primary" onclick="searchTrack()" style="padding: 0 25px; font-size: 1rem;"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
            </div>
        </div>

        <div id="loading" class="hidden" style="text-align: center; padding: 40px;">
            <div class="loading-spinner" style="margin: 0 auto;"></div>
            <p style="margin-top: 15px; color: var(--text-light);">Localizando sua encomenda...</p>
        </div>

        <div id="error-msg" class="hidden" style="background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #ef4444; margin-bottom: 20px;"></div>

        <div id="track-result" class="hidden">
            <!-- Conteúdo injetado via JS -->
        </div>

    </main>

    <footer style="text-align: center; padding: 20px; color: var(--text-light); font-size: 0.8rem; border-top: 1px solid var(--border-color); background: var(--card-bg);">
        &copy; 2024 GreenX TMS. Todos os direitos reservados.
    </footer>

    <script src="firebase.js"></script>
    <script>
        // Inicializa a busca se houver parâmetro na URL
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (id) {
                document.getElementById('track-input').value = id;
                searchTrack(id);
            }
        });

        async function searchTrack(idOverride) {
            const id = idOverride || document.getElementById('track-input').value.trim();
            if (!id) return;

            // UI Updates
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('track-result').classList.add('hidden');
            document.getElementById('error-msg').classList.add('hidden');

            try {
                // Garante que os dados mais recentes sejam carregados
                await loadDb();

                const f = window.db.freights && window.db.freights.find(item => String(item.id).toUpperCase() === id.toUpperCase());

                if (f) {
                    renderTracking(f);
                } else {
                    showError('Encomenda não encontrada. Verifique o código e tente novamente.');
                }
            } catch (error) {
                console.error(error);
                showError('Erro ao conectar com o servidor de dados.');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        function shareWhatsApp(id) {
            const url = new URL(window.location.href);
            url.searchParams.set('id', id);
            const text = `Olá! Acompanhe o status da sua encomenda ${id} pelo link: ${url.toString()}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        function renderTracking(f) {
            const container = document.getElementById('track-result');
            container.classList.remove('hidden');

            // Badge Status
            let badgeClass = 'status-pendente';
            if(f.status === 'Em Trânsito') badgeClass = 'status-transito';
            if(f.status === 'Entregue') badgeClass = 'status-entregue';

            // Timeline
            const historySorted = f.trackingHistory ? [...f.trackingHistory].sort((a, b) => new Date(b.date) - new Date(a.date)) : [];
            
            let timelineHtml = '';
            let lastDate = '';

            historySorted.forEach(h => {
                const dateObj = new Date(h.date);
                const dateKey = dateObj.toLocaleDateString('pt-BR');
                const timeStr = dateObj.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const isAlert = h.alert ? 'timeline-alert' : '';

                if (dateKey !== lastDate) {
                    timelineHtml += `<div style="margin: 15px 0 10px -42px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-dark); padding: 4px 10px; border-radius: 12px; font-weight: 600; font-size: 0.8rem; display: inline-block; position: relative; z-index: 1;">${dateKey}</div>`;
                    lastDate = dateKey;
                }

                timelineHtml += `
                    <div class="timeline-item ${isAlert}">
                        <div class="timeline-date">${timeStr}</div>
                        <div class="timeline-content">
                            <h4>${h.status} ${h.alert ? '<i class="fa-solid fa-triangle-exclamation" style="color:var(--danger)"></i>' : ''}</h4>
                            <p><strong>Local:</strong> ${h.location}</p>
                            <p>${h.observation || ''}</p>
                        </div>
                    </div>
                `;
            });

            if (historySorted.length === 0) timelineHtml = '<p style="color: #666; font-style: italic;">Aguardando postagem ou movimentação.</p>';

            container.innerHTML = `
                <div class="card" style="text-align: center; margin-bottom: 30px; border-top: 5px solid var(--primary); padding: 30px;">
                    <h1 style="margin: 10px 0; color: var(--text-dark); font-size: 2rem;">${f.id}</h1>
                    <span class="status-badge ${badgeClass}" style="font-size: 1.1rem; padding: 8px 20px;">${f.status}</span>
                    
                    <div style="margin-top: 20px;">
                        <button onclick="shareWhatsApp('${f.id}')" style="background-color: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; display: inline-flex; align-items: center; gap: 8px;">
                            <i class="fa-brands fa-whatsapp"></i> Compartilhar no WhatsApp
                        </button>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; text-align: left; background: var(--bg-light); padding: 20px; border-radius: 8px;">
                        <div>
                            <small style="color: var(--text-light); text-transform: uppercase; font-size: 0.75rem; font-weight: bold;">Origem</small>
                            <div style="font-weight: 600; font-size: 1.1rem; margin-top: 5px;">${f.remetente}</div>
                            <div style="font-size: 0.9rem; color: var(--text-light);">${f.uf || ''}</div>
                        </div>
                        <div style="display:flex; align-items:center; justify-content:center; color: var(--primary);">
                            <i class="fa-solid fa-arrow-right" style="font-size: 1.5rem;"></i>
                        </div>
                        <div>
                            <small style="color: var(--text-light); text-transform: uppercase; font-size: 0.75rem; font-weight: bold;">Destino</small>
                            <div style="font-weight: 600; font-size: 1.1rem; margin-top: 5px;">${f.destinatario}</div>
                            <div style="font-size: 0.9rem; color: var(--text-light);">${f.cidade || ''} - ${f.uf || ''}</div>
                        </div>
                    </div>
                    ${f.deliveryDate ? `<div style="margin-top: 20px; font-size: 1rem; color: var(--text-dark);">Previsão de Entrega: <strong>${new Date(f.deliveryDate).toLocaleDateString('pt-BR')}</strong></div>` : ''}
                </div>

                <h3 style="margin-bottom: 20px; padding-left: 15px; border-left: 5px solid var(--primary); color: var(--text-dark);">Histórico de Movimentação</h3>
                <div class="timeline">
                    ${timelineHtml}
                </div>
            `;
        }
    </script>
</body>
</html>
